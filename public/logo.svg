<svg width="280" height="64" viewBox="0 0 280 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DealAdvisor Logo">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2563EB" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#iconGrad)" filter="url(#shadow)"/>

  <!-- Highlight circle -->
  <circle cx="14" cy="14" r="18" fill="white" fill-opacity="0.08"/>

  <!-- Magnifying glass circle -->
  <circle cx="28" cy="27" r="13" stroke="white" stroke-width="3.2" fill="none"/>

  <!-- Magnifying glass handle -->
  <line x1="37.5" y1="37.5" x2="50" y2="50" stroke="white" stroke-width="3.4" stroke-linecap="round"/>

  <!-- Checkmark inside glass -->
  <path d="M22 27.5 L26.5 32 L34.5 21.5" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark -->
  <text x="80" y="42" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="34" fill="#2563EB" letter-spacing="-0.5">Deal</text>
  <text x="153" y="42" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="34" fill="#111827" letter-spacing="-0.5">Advisor</text>

  <!-- Tagline -->
  <text x="81" y="57" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#6B7280" letter-spacing="0.3">Shop smarter, every time</text>
</svg>
